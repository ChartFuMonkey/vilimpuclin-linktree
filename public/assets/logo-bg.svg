<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 620" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="vp-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD043"/>
      <stop offset="0.55" stop-color="#F5B800"/>
      <stop offset="1" stop-color="#A37C00"/>
    </linearGradient>
    <linearGradient id="vp-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE89A"/>
      <stop offset="0.5" stop-color="#D6A000"/>
      <stop offset="1" stop-color="#6E5300"/>
    </linearGradient>
  </defs>

  <!-- Outer shield -->
  <path d="M250 10
           L470 70
           L470 330
           Q470 470 250 610
           Q30 470 30 330
           L30 70 Z"
        stroke="url(#vp-edge)" stroke-width="10" fill="#000"/>

  <!-- Inner shield border -->
  <path d="M250 45
           L440 95
           L440 325
           Q440 450 250 570
           Q60 450 60 325
           L60 95 Z"
        stroke="url(#vp-gold)" stroke-width="4" fill="none"/>

  <!-- Top banner -->
  <rect x="85" y="115" width="330" height="34" fill="url(#vp-gold)"/>
  <text x="250" y="141"
        text-anchor="middle"
        font-family="Oswald, Impact, sans-serif"
        font-size="22" font-weight="700" letter-spacing="6"
        fill="#000">VILIM PUCLIN</text>

  <!-- VP monogram -->
  <text x="250" y="360"
        text-anchor="middle"
        font-family="Oswald, Impact, sans-serif"
        font-size="220" font-weight="700"
        fill="url(#vp-gold)">VP</text>

  <!-- Barbell -->
  <g stroke="url(#vp-gold)" stroke-width="8" stroke-linecap="round">
    <line x1="110" y1="450" x2="390" y2="450"/>
    <rect x="100" y="430" width="18" height="40" fill="url(#vp-gold)" stroke="none"/>
    <rect x="382" y="430" width="18" height="40" fill="url(#vp-gold)" stroke="none"/>
    <rect x="80"  y="438" width="14" height="24" fill="url(#vp-gold)" stroke="none"/>
    <rect x="406" y="438" width="14" height="24" fill="url(#vp-gold)" stroke="none"/>
  </g>

  <!-- Bottom tag -->
  <text x="250" y="510"
        text-anchor="middle"
        font-family="Oswald, Impact, sans-serif"
        font-size="22" font-weight="700" letter-spacing="6"
        fill="url(#vp-gold)">FITNESS COACH</text>
</svg>
